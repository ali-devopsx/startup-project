name: CI Build Django APP
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        run: docker --version

      - name: Build Docker image
        run: docker build -t my_ci_django .
     
      - name: Docker login
        run: echo "${{ secrets.DOCKER_USERNAME }}" | docker login -u "${{ secrets.DOCKER_PASSWORD }}" --password-stdin

      - name: Docker build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/django-app
     
      - name: Docker Push Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/django-app
